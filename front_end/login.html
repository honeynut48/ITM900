<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | InsureTech POC</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <style>
    :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --border: #e2e8f0; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-card { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid var(--border); }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand h1 { font-size: 24px; margin: 0; color: var(--primary); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); font-size: 15px; outline: none; box-sizing: border-box; }
    .login-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand"><h1>InsureTech Repo</h1><p>BSA Intelligence Portal</p></div>
    <form id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" value="admin@company.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" value="password123" required></div>
      <button type="submit" id="btn" class="login-btn">Sign In</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.innerText = "Authenticating...";
      
      // Simulate a fast network response for the POC
      setTimeout(() => {
        sessionStorage.setItem('isLoggedIn', 'true');
        window.location.href = "index.html";
      }, 600);
    });
  </script>
</body>
</html>
